# xylem configuration
# Docs: https://github.com/nicholls-inc/claude-code-marketplace/tree/main/xylem

sources:
  bugs:
    type: github
    repo: nicholls-inc/xylem
    exclude:
      [wontfix, duplicate, in-progress, no-bot, harness-impl, xylem-failed]
    tasks:
      fix-bugs:
        labels: [bug, ready-for-work]
        workflow: fix-bug
        status_labels:
          failed: xylem-failed
          timed_out: xylem-failed

  features:
    type: github
    repo: nicholls-inc/xylem
    exclude:
      [wontfix, duplicate, in-progress, no-bot, harness-impl, xylem-failed]
    tasks:
      implement-features:
        labels: [enhancement, ready-for-work]
        workflow: implement-feature
        status_labels:
          failed: xylem-failed
          timed_out: xylem-failed

  triage:
    type: github
    repo: nicholls-inc/xylem
    exclude:
      [wontfix, duplicate, in-progress, no-bot, needs-refinement, xylem-failed]
    llm: copilot
    model: gpt-5-mini
    tasks:
      triage-issues:
        labels: [needs-triage]
        workflow: triage
        status_labels:
          failed: xylem-failed
          timed_out: xylem-failed

  refinement:
    type: github
    repo: nicholls-inc/xylem
    exclude: [wontfix, duplicate, in-progress, no-bot, xylem-failed]
    tasks:
      refine-issues:
        labels: [needs-refinement]
        workflow: refine-issue
        status_labels:
          failed: xylem-failed
          timed_out: xylem-failed

  # Harness implementation issues
  harness-impl:
    type: github
    repo: nicholls-inc/xylem
    timeout: "90m"
    exclude: [wontfix, duplicate, in-progress, no-bot, blocked, xylem-failed]
    tasks:
      implement-harness-steps:
        labels: [harness-impl, ready-for-work]
        workflow: implement-harness
        status_labels:
          running: in-progress
          failed: xylem-failed
          timed_out: xylem-failed

  # PR review + CI failure monitoring for harness PRs
  # NOTE: review_submitted and checks_failed fire for ALL open PRs.
  # Each workflow's analyze phase checks for harness-impl label and
  # exits via XYLEM_NOOP if absent.
  harness-pr-lifecycle:
    type: github-pr-events
    repo: nicholls-inc/xylem
    exclude: [no-bot, pr-vessel-active]
    tasks:
      respond-reviews:
        workflow: respond-to-pr-review
        on:
          review_submitted: true
          # Only respond to reviews authored by GitHub Copilot.
          # Without this allowlist, xylem's own review responses (posted
          # as the authenticated gh user) would trigger new vessels and
          # create a runaway feedback loop.
          # NOTE: the "[bot]" suffix is quoted for portability with
          # strict YAML 1.1 parsers; yaml.v3 accepts either form.
          author_allow:
            - "copilot-pull-request-reviewer[bot]"
      fix-checks:
        workflow: fix-pr-checks
        on:
          checks_failed: true

  # Merge-ready harness PRs
  harness-merge:
    type: github-pr
    repo: nicholls-inc/xylem
    exclude: [no-bot, pr-vessel-active]
    tasks:
      merge-ready:
        labels: [ready-to-merge, harness-impl]
        workflow: merge-pr
        status_labels:
          running: pr-vessel-active
          completed: pr-vessel-merged
          failed: xylem-failed

  # Conflict resolution for harness PRs
  conflict-resolution:
    type: github-pr
    repo: nicholls-inc/xylem
    exclude: [no-bot, pr-vessel-active]
    tasks:
      resolve-conflicts:
        labels: [needs-conflict-resolution, harness-impl]
        workflow: resolve-conflicts
        status_labels:
          running: pr-vessel-active
          failed: xylem-failed

  sota-gap:
    type: scheduled
    repo: nicholls-inc/xylem
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-self-gap-analysis:
        workflow: sota-gap-analysis
        ref: sota-gap-analysis

  continuous-simplicity:
    type: scheduled
    repo: nicholls-inc/xylem
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-continuous-simplicity:
        workflow: continuous-simplicity
        ref: continuous-simplicity

  harness-gap-analysis:
    type: scheduled
    repo: nicholls-inc/xylem
    schedule: "4h"
    timeout: "30m"
    tasks:
      analyze-gaps:
        workflow: harness-gap-analysis
        ref: harness-gap-analysis

  # Post-merge wave dependency unblocking
  # NOTE: github-merge has no label filtering. The unblock-wave prompt
  # guards with XYLEM_NOOP for non-harness merges.
  harness-post-merge:
    type: github-merge
    repo: nicholls-inc/xylem
    tasks:
      unblock-deps:
        workflow: unblock-wave

observability:
  enabled: true
  endpoint: "localhost:4317"
  insecure: true
  sample_rate: 1.0

validation:
  format: "goimports -l ./cli/..."
  lint: "go vet ./cli/..."
  build: "go build ./cli/cmd/xylem"
  test: "go test ./cli/..."

daemon:
  auto_upgrade: true
  auto_merge: true
  auto_merge_repo: nicholls-inc/xylem
  auto_merge_labels: [ready-to-merge, harness-impl]
  auto_merge_branch_pattern: "^(feat|fix|chore)/issue-\\d+"
  auto_merge_reviewer: "copilot-pull-request-reviewer"

concurrency: 3
max_turns: 80
timeout: "45m"
state_dir: ".xylem"

# llm selects the global default LLM provider: "claude" (default) or "copilot"
llm: copilot
model: gpt-5.4

claude:
  command: "claude"
  flags: "--dangerously-skip-permissions"
  default_model: "claude-sonnet-4-6"
  env:
    ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  # allowed_tools:
  #   - "Bash(gh issue view *)"
  #   - "Bash(gh pr create *)"
  #   - "WebFetch"

copilot:
  command: "copilot"
  flags: "--yolo --autopilot --effort medium"
  default_model: "gpt-5.4"
  env:
    COPILOT_GITHUB_TOKEN: "${COPILOT_GITHUB_TOKEN}"
