# xylem configuration
# Docs: https://github.com/nicholls-inc/claude-code-marketplace/tree/main/xylem

profiles: [core, self-hosting-xylem]

notifications:
  github_discussion:
    enabled: true
    repo: nicholls-inc/xylem
    category: "Status Reports"
    interval: "@daily"
  telegram:
    enabled: true
    token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"
    levels: [critical, warning]

observability:
  enabled: true
  endpoint: "localhost:4317"
  insecure: true
  sample_rate: 1.0

validation:
  format: "goimports -l ."
  lint: "(cd cli && go vet ./...)"
  build: "(cd cli && go build ./cmd/xylem)"
  test: "(cd cli && go test ./...)"

max_turns: 100
timeout: "45m"
state_dir: ".xylem"

# llm selects the global default LLM provider: "claude" (default) or "copilot"
llm: claude
model: claude-sonnet-4-6

claude:
  command: "claude"
  flags: "--dangerously-skip-permissions"
  default_model: "claude-sonnet-4-6"
  env:
    ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  # allowed_tools:
  #   - "Bash(gh issue view *)"
  #   - "Bash(gh pr create *)"
  #   - "WebFetch"

copilot:
  command: "copilot"
  flags: "--yolo --autopilot --effort medium"
  default_model: "gpt-5.4"
  env:
    COPILOT_GITHUB_TOKEN: "${COPILOT_GITHUB_TOKEN}"
