name: implement-harness
description: "Implement a harness spec step with verification, testing, and smoke scenarios"
phases:
  - name: analyze
    prompt_file: .xylem/prompts/implement-harness/analyze.md
    max_turns: 30
    noop:
      match: XYLEM_NOOP
  - name: plan
    prompt_file: .xylem/prompts/implement-harness/plan.md
    max_turns: 30
  - name: implement
    prompt_file: .xylem/prompts/implement-harness/implement.md
    max_turns: 80
    gate:
      type: command
      run: "cd cli && go vet ./... && go build ./cmd/xylem && go test ./..."
      retries: 3
  - name: verify
    prompt_file: .xylem/prompts/implement-harness/verify.md
    max_turns: 80
    gate:
      type: command
      run: "cd cli && go test ./..."
      retries: 2
  - name: test_critic
    prompt_file: .xylem/prompts/implement-harness/test_critic.md
    max_turns: 30
    gate:
      type: command
      run: "cd cli && go test ./..."
      retries: 1
  - name: smoke
    prompt_file: .xylem/prompts/implement-harness/smoke.md
    max_turns: 60
    gate:
      type: command
      run: "cd cli && go test ./..."
      retries: 2
  - name: pr_draft
    prompt_file: .xylem/prompts/implement-harness/pr_draft.md
    max_turns: 30
    gate:
      type: command
      run: |
        set -euo pipefail

        current_branch=$(git branch --show-current)
        if [ -z "$current_branch" ]; then
          echo "ERROR: current branch is empty"
          exit 1
        fi

        git fetch origin main "$current_branch"

        if ! git merge-base --is-ancestor origin/main HEAD; then
          echo "ERROR: branch is behind origin/main; rebase before pushing"
          exit 1
        fi

        if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/$current_branch")" ]; then
          echo "ERROR: remote branch does not match HEAD; push the rebased branch before continuing"
          exit 1
        fi

        cd cli
        go vet ./...
        go build ./cmd/xylem
        go test ./...
  - name: pr_create
    type: command
    run: |
      set -euo pipefail

      git fetch origin main
      if ! git merge-base --is-ancestor origin/main HEAD; then
        echo "ERROR: branch is behind origin/main; rebase before creating the PR"
        exit 1
      fi

      DRAFT_FILE="pr_draft.json"
      if [ ! -f "$DRAFT_FILE" ]; then
        echo "ERROR: pr_draft.json not found in worktree root"
        exit 1
      fi

      TITLE=$(jq -r '.title' "$DRAFT_FILE")
      BODY=$(jq -r '.body' "$DRAFT_FILE")

      if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
        echo "ERROR: title is missing or null in pr_draft.json"
        exit 1
      fi

      # Append Fixes #N deterministically so GitHub auto-closes the issue
      BODY="${BODY}

      Fixes #{{.Issue.Number}}"

      gh pr create \
        --repo nicholls-inc/xylem \
        --title "$TITLE" \
        --body "$BODY" \
        --label "ready-to-merge"
