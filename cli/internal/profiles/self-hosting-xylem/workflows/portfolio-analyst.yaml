name: portfolio-analyst
class: harness-maintenance
description: "Weekly analysis of token consumption patterns and throughput trends across the last 7 daily metrics reports"
phases:
  - name: collect
    type: command
    noop:
      match: XYLEM_NOOP
    run: |
      set -euo pipefail
      mkdir -p .xylem/state/metrics
      ls .xylem/state/metrics/*-report.md 2>/dev/null | sort | tail -7 \
        > .xylem/state/metrics/portfolio-inputs.txt || true
      COUNT=$(wc -l < .xylem/state/metrics/portfolio-inputs.txt | tr -d ' ')
      if [ "$COUNT" -eq 0 ]; then
        echo "XYLEM_NOOP: no daily reports available yet"
      fi
  - name: analyze
    prompt_file: .xylem/prompts/portfolio-analyst/analyze.md
    max_turns: 40
  - name: report
    prompt_file: .xylem/prompts/portfolio-analyst/report.md
    max_turns: 30
  - name: post
    type: command
    noop:
      match: XYLEM_NOOP
    output: discussion
    discussion:
      category: Reports
      title_template: "[portfolio] Weekly tracking {{.Date}}"
      title_search_template: "[portfolio] Weekly tracking"
    run: |
      set -euo pipefail
      REPORT=".xylem/state/metrics/portfolio-report.md"
      if [ ! -f "$REPORT" ]; then
        echo "XYLEM_NOOP: no portfolio report to post"
        exit 0
      fi
      cat "$REPORT"
