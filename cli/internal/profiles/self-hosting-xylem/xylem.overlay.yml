sources:
  pr-self-review:
    type: github-pr
    repo: "{{ .Repo }}"
    exclude: [no-bot, pr-vessel-active]
    tasks:
      self-review:
        labels: [ready-to-merge]
        workflow: pr-self-review
        status_labels:
          running: pr-vessel-active
          failed: xylem-failed

  harness-pr-lifecycle:
    type: github-pr-events
    repo: "{{ .Repo }}"
    exclude: [no-bot, pr-vessel-active]
    tasks:
      respond-reviews:
        workflow: respond-to-pr-review
        on:
          review_submitted: true
          author_allow:
            - "copilot-pull-request-reviewer[bot]"
      fix-checks:
        workflow: fix-pr-checks
        on:
          checks_failed: true
  harness-merge:
    type: github-pr
    repo: "{{ .Repo }}"
    exclude: [no-bot, pr-vessel-active]
    tasks:
      merge-ready:
        labels: [ready-to-merge]
        workflow: merge-pr
        status_labels:
          running: pr-vessel-active
          completed: pr-vessel-merged
          failed: xylem-failed
  conflict-resolution:
    type: github-pr
    repo: "{{ .Repo }}"
    exclude: [no-bot, pr-vessel-active]
    tasks:
      resolve-conflicts:
        labels: [needs-conflict-resolution]
        workflow: resolve-conflicts
        status_labels:
          running: pr-vessel-active
          failed: xylem-failed
  sota-gap:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-self-gap-analysis:
        workflow: sota-gap-analysis
        ref: sota-gap-analysis
  hardening-audit:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@monthly"
    timeout: "90m"
    tasks:
      monthly-hardening-audit:
        workflow: hardening-audit
        ref: hardening-audit
  continuous-simplicity:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-continuous-simplicity:
        workflow: continuous-simplicity
        ref: continuous-simplicity
  continuous-improvement:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "90m"
    tasks:
      daily-rotation:
        workflow: continuous-improvement
        ref: continuous-improvement
  release-cadence:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "4h"
    timeout: "15m"
    tasks:
      label-mature-release-pr:
        workflow: release-cadence
        ref: release-cadence
  metrics-collector:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "60m"
    tasks:
      daily-metrics:
        workflow: metrics-collector
        ref: metrics-collector

  portfolio-analyst:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "60m"
    tasks:
      weekly-portfolio:
        workflow: portfolio-analyst
        ref: portfolio-analyst

  audit:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "60m"
    tasks:
      daily-audit:
        workflow: audit
        ref: audit

  initiative-tracker:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "60m"
    tasks:
      weekly-initiative-status:
        workflow: initiative-tracker
        ref: initiative-tracker

  backlog-refinement:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "60m"
    tasks:
      daily-backlog-refinement:
        workflow: backlog-refinement
        ref: backlog-refinement

  ingest-field-reports:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "60m"
    tasks:
      weekly-field-ingest:
        workflow: ingest-field-reports
        ref: ingest-field-reports

  harness-post-merge:
    type: github-merge
    repo: "{{ .Repo }}"
    tasks:
      unblock-deps:
        workflow: unblock-wave

  diagnose-failures:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "2h"
    timeout: "45m"
    tasks:
      hourly-diagnose-failures:
        workflow: diagnose-failures
        ref: diagnose-failures

  autonomy-review:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-autonomy-review:
        workflow: autonomy-review
        ref: autonomy-review

  ci-watchdog:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "1h"
    timeout: "30m"
    tasks:
      monitor-main-ci:
        workflow: ci-watchdog
        ref: ci-watchdog

daemon:
  auto_upgrade: true
  auto_merge: true
  auto_merge_repo: "{{ .Repo }}"
  auto_merge_labels: [ready-to-merge]
  auto_merge_branch_pattern: "^((feat|fix|chore)/issue-[0-9]+|release-please--.+)"
  auto_merge_reviewer: "copilot-pull-request-reviewer"

concurrency:
  global: 3
  per_class:
    backlog-refinement: 1
