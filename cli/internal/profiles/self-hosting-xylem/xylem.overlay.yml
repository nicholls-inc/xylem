sources:
  sota-gap:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-self-gap-analysis:
        workflow: sota-gap-analysis
        ref: sota-gap-analysis
  hardening-audit:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@monthly"
    timeout: "90m"
    tasks:
      monthly-hardening-audit:
        workflow: hardening-audit
        ref: hardening-audit
  continuous-simplicity:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "90m"
    tasks:
      weekly-continuous-simplicity:
        workflow: continuous-simplicity
        ref: continuous-simplicity
  continuous-improvement:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "90m"
    tasks:
      daily-rotation:
        workflow: continuous-improvement
        ref: continuous-improvement
  release-cadence:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "4h"
    timeout: "15m"
    tasks:
      label-mature-release-pr:
        workflow: release-cadence
        ref: release-cadence
  metrics-collector:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "60m"
    tasks:
      daily-metrics:
        workflow: metrics-collector
        ref: metrics-collector

  portfolio-analyst:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "60m"
    tasks:
      weekly-portfolio:
        workflow: portfolio-analyst
        ref: portfolio-analyst

  audit:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "60m"
    tasks:
      daily-audit:
        workflow: audit
        ref: audit

  initiative-tracker:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "60m"
    tasks:
      weekly-initiative-status:
        workflow: initiative-tracker
        ref: initiative-tracker

  backlog-refinement:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@daily"
    timeout: "60m"
    tasks:
      daily-backlog-refinement:
        workflow: backlog-refinement
        ref: backlog-refinement

  ingest-field-reports:
    type: scheduled
    repo: "{{ .Repo }}"
    schedule: "@weekly"
    timeout: "60m"
    tasks:
      weekly-field-ingest:
        workflow: ingest-field-reports
        ref: ingest-field-reports

  post-merge:
    type: github-merge
    repo: "{{ .Repo }}"
    tasks:
      unblock-deps:
        workflow: unblock-wave

daemon:
  auto_upgrade: true
  auto_merge: true
  auto_merge_repo: "{{ .Repo }}"
  auto_merge_labels: [ready-to-merge]
  auto_merge_branch_pattern: "^((feat|fix|chore)/issue-[0-9]+|release-please--.+)"
  auto_merge_reviewer: "copilot-pull-request-reviewer"

concurrency:
  global: 3
  per_class:
    backlog-refinement: 1
