name: lean-squad-aeneas
description: "Lean Squad Task 8: use Charon + Aeneas to auto-generate Lean 4 translations from Rust"
phases:
  - name: analyze
    prompt_file: .xylem/prompts/lean-squad-aeneas/analyze.md
    max_turns: 40
    noop:
      match: XYLEM_NOOP
  - name: implement
    prompt_file: .xylem/prompts/lean-squad-aeneas/implement.md
    max_turns: 50
  - name: verify
    type: command
    run: |
      set -euo pipefail
      check() {
        (cd formal-verification && lake build 2>&1 | tee /tmp/lean-build.log) \
          && ! grep -q "error:" /tmp/lean-build.log
      }
      check || { sleep 30; check; }
  - name: pr
    prompt_file: .xylem/prompts/lean-squad-aeneas/pr.md
    max_turns: 20
