name: workflow-health-report
class: ops
description: "Summarize weekly workflow health and publish a GitHub issue when needed"
phases:
  - name: analyze
    prompt_file: .xylem/prompts/workflow-health-report/analyze.md
    max_turns: 20
    noop:
      match: XYLEM_NOOP
  - name: report
    prompt_file: .xylem/prompts/workflow-health-report/report.md
    max_turns: 20
  - name: post
    type: command
    noop:
      match: XYLEM_NOOP
    output: discussion
    discussion:
      category: Reports
      title_template: "[health] Weekly workflow health — {{.Date}}"
      title_search_template: "[health] Weekly workflow health"
    run: |
      set -euo pipefail
      REPORT=".xylem/state/workflow-health-report.md"
      if [ ! -f "$REPORT" ]; then
        echo "XYLEM_NOOP: no health report to post"
        exit 0
      fi
      cat "$REPORT"
