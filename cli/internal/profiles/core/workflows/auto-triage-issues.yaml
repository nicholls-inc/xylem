name: auto-triage-issues
class: ops
description: "Discover unlabeled issues, classify them conservatively, and apply labels in batch"
phases:
  - name: discover
    prompt_file: .xylem/prompts/auto-triage-issues/discover.md
    max_turns: 20
    allowed_tools: "Bash, Read"
    noop:
      match: XYLEM_NOOP
  - name: classify
    prompt_file: .xylem/prompts/auto-triage-issues/classify.md
    max_turns: 30
    allowed_tools: "Bash, Read"
    gate:
      type: command
      run: |
        set -eu
        out=".xylem/phases/{{.Vessel.ID}}/classify.output"
        test -s "$out"
        labels="$(mktemp)"
        trap 'rm -f "$labels"' EXIT
        gh label list --repo "{{.Repo.Slug}}" --limit 200 --json name >"$labels"
        python3 - "$out" "$labels" <<'PY'
        import json
        import pathlib
        import sys

        out_path, labels_path = sys.argv[1:3]
        data = json.loads(pathlib.Path(out_path).read_text())
        if not isinstance(data, dict):
            raise SystemExit("classification output must be a JSON object")

        issues = data.get("issues")
        if not isinstance(issues, list):
            raise SystemExit("classification output must contain an issues array")
        if len(issues) > 10:
            raise SystemExit("classification output may not include more than 10 issues")

        label_payload = json.loads(pathlib.Path(labels_path).read_text())
        repo_labels = {entry["name"] for entry in label_payload if isinstance(entry, dict) and "name" in entry}

        for idx, issue in enumerate(issues):
            if not isinstance(issue, dict):
                raise SystemExit(f"issue {idx} must be an object")
            number = issue.get("number")
            if not isinstance(number, int) or number <= 0:
                raise SystemExit(f"issue {idx} has invalid number: {number!r}")

            action = issue.get("action")
            if action not in {"apply", "needs-triage", "skip"}:
                raise SystemExit(f"issue {number} has invalid action: {action!r}")

            confidence = issue.get("confidence")
            if not isinstance(confidence, (int, float)) or confidence < 0 or confidence > 1:
                raise SystemExit(f"issue {number} has invalid confidence: {confidence!r}")

            labels = issue.get("proposed_labels")
            if not isinstance(labels, list) or any(not isinstance(label, str) or not label.strip() for label in labels):
                raise SystemExit(f"issue {number} proposed_labels must be a list of non-empty strings")
            if action != "skip" and len(labels) == 0:
                raise SystemExit(f"issue {number} must propose at least one label")

            missing = sorted({label for label in labels if label not in repo_labels})
            if missing:
                raise SystemExit(f"issue {number} proposes labels not present in repo: {', '.join(missing)}")
            if action == "needs-triage" and "needs-triage" not in labels:
                raise SystemExit(f"issue {number} must include needs-triage when action is needs-triage")

            reason = issue.get("reason")
            if not isinstance(reason, str) or not reason.strip():
                raise SystemExit(f"issue {number} must include a non-empty reason")

        print("classification output validated")
        PY
  - name: apply
    prompt_file: .xylem/prompts/auto-triage-issues/apply.md
    max_turns: 25
    allowed_tools: "Bash, Read"
