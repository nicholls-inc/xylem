version: v1
differential:
  - name: gh-issue-list-open-bug
    boundary: gh
    enabled_env: XYLEM_DTU_LIVE_GH_DIFFERENTIAL
    command: gh
    args: [issue, list, --repo, owner/repo, --state, open, --json, number,title,body,url,labels, --limit, "20", --label, bug]
    normalizer: issue_list
    fixture: issue-label-gate.yaml
  - name: gh-pr-list-open
    boundary: gh
    enabled_env: XYLEM_DTU_LIVE_GH_DIFFERENTIAL
    command: gh
    args: [pr, list, --repo, owner/repo, --state, open, --json, number,title,body,url,labels,headRefName, --limit, "20"]
    normalizer: pr_list
    fixture: github-pr-copilot.yaml
  - name: gh-issue-view-labels
    boundary: gh
    enabled_env: XYLEM_DTU_LIVE_GH_DIFFERENTIAL
    command: gh
    args: [issue, view, "1", --repo, owner/repo, --json, labels]
    normalizer: labels_only
    fixture: issue-label-gate.yaml
  - name: git-ls-remote-main
    boundary: git
    enabled_env: XYLEM_DTU_LIVE_GIT_DIFFERENTIAL
    command: git
    args: [ls-remote, --heads, origin, main]
    normalizer: git_ls_remote_heads
    fixture: issue-happy-path.yaml
  - name: provider-headless-shape
    boundary: copilot
    enabled_env: XYLEM_DTU_LIVE_PROVIDER_DIFFERENTIAL
    command: copilot
    args: [-p, "HARNESS HEADER\n\nReview this change", -s, --available-tools, "Read,Write", --allow-all-tools]
    normalizer: provider_process_shape
    fixture: github-pr-copilot.yaml
  - name: claude-headless-shape
    boundary: claude
    enabled_env: XYLEM_DTU_LIVE_PROVIDER_DIFFERENTIAL
    command: claude
    args: [-p, smoke test, --max-turns, "1"]
    normalizer: provider_process_shape
    fixture: issue-happy-path.yaml
canaries:
  - name: gh-repo-view-default-branch
    boundary: gh
    enabled_env: XYLEM_DTU_LIVE_CANARY
    command: gh
    args: [repo, view, --json, defaultBranchRef]
    fixture: issue-label-gate.yaml
  - name: git-origin-head-symbolic-ref
    boundary: git
    enabled_env: XYLEM_DTU_LIVE_CANARY
    command: git
    args: [symbolic-ref, refs/remotes/origin/HEAD]
    normalizer: git_symbolic_ref
  - name: claude-headless-smoke
    boundary: claude
    enabled_env: XYLEM_DTU_LIVE_CANARY
    command: claude
    args: [-p, smoke test, --max-turns, "1"]
  - name: copilot-headless-smoke
    boundary: copilot
    enabled_env: XYLEM_DTU_LIVE_CANARY
    command: copilot
    args: [-p, smoke test, -s]
