metadata:
  name: issue-daemon-recovery
  scenario: daemon restart reconciles stale running vessel
repositories:
  - owner: owner
    name: repo
    default_branch: main
    labels:
      - name: bug
      - name: queued
      - name: in-progress
      - name: failed
    issues:
      - number: 4
        title: orphaned vessel
        body: daemon crashed mid-run
        labels: [bug]
providers:
  scripts:
    - name: implement
      provider: claude
      match:
        phase: implement
      stdout: implementation complete
