sources:
  bugs:
    type: github
    repo: acme/widget
    tasks:
      ws5-eval-suite:
        labels: [bug]
        workflow: eval-suite
        status_labels:
          queued: queued
          running: in-progress
          completed: done
          failed: failed

concurrency: 1
max_turns: 5
timeout: "5m"
state_dir: ".xylem-state"

llm: claude
claude:
  command: "claude"
  default_model: "claude-sonnet-4-6"
