sources:
  bugs:
    type: github
    repo: acme/widget
    tasks:
      ws3-summary-artifacts:
        labels: [bug]
        workflow: summary-artifacts
        status_labels:
          queued: queued
          running: in-progress
          completed: done
          failed: failed

concurrency: 1
max_turns: 5
timeout: "5m"
state_dir: ".xylem-state"

llm: claude
claude:
  command: "claude"
  default_model: "claude-sonnet-4-6"

observability:
  enabled: true
  service_name: "xylem-summary-smoke"
  sample_rate: 1.0

cost:
  budget_usd: 0.05
