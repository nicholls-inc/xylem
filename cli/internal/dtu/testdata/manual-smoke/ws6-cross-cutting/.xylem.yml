sources:
  bugs:
    type: github
    repo: acme/widget
    tasks:
      ws6-cross-cutting:
        labels: [bug]
        workflow: cross-cutting
        status_labels:
          queued: queued
          running: in-progress
          completed: done
          failed: failed

concurrency: 1
max_turns: 5
timeout: "5m"
state_dir: ".xylem-state"

llm: claude
claude:
  command: "claude"

harness:
  protected_surfaces:
    paths:
      - ".xylem.yml"
      - ".xylem/HARNESS.md"

observability:
  enabled: true
  service_name: "xylem-cross-cutting-smoke"
  sample_rate: 1.0

cost:
  budget_usd: 0.05
