# WS1 require-approval manual smoke fixture
sources:
  issues:
    type: github
    repo: acme/widget
    tasks:
      bugs:
        labels: [bug]
        workflow: fix-bug-require-approval
        status_labels:
          queued: queued
          running: in-progress
          completed: done
          failed: failed

concurrency: 1
max_turns: 5
timeout: "1m"
state_dir: ".xylem"
default_branch: main
claude:
  default_model: "claude-sonnet-4-6"
harness:
  audit_log: "audit.jsonl"
  protected_surfaces:
    paths:
      - ".xylem/HARNESS.md"
      - ".xylem.yml"
      - ".xylem/workflows/*.yaml"
      - ".xylem/prompts/*/*.md"
  policy:
    rules:
      - action: "phase_execute"
        resource: "*"
        effect: "require_approval"
