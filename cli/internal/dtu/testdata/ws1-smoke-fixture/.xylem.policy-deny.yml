# WS1 deny-policy manual smoke fixture
sources:
  issues:
    type: github
    repo: acme/widget
    tasks:
      bugs:
        labels: [bug]
        workflow: fix-bug-deny
        status_labels:
          queued: queued
          running: in-progress
          completed: done
          failed: failed

concurrency: 1
max_turns: 5
timeout: "1m"
state_dir: ".xylem"
default_branch: main
harness:
  policy:
    rules:
      - action: "*"
        resource: "*"
        effect: "deny"
