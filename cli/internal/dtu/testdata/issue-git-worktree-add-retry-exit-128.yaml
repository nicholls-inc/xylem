metadata:
  name: issue-git-worktree-add-retry-exit-128
  scenario: git worktree add exit code 128 retries and succeeds
repositories:
  - owner: owner
    name: repo
    default_branch: main
    labels:
      - name: bug
      - name: queued
      - name: in-progress
      - name: done
    issues:
      - number: 9
        title: worktree add exit one twenty eight
        body: worktree creation should retry git worktree add after exit 128
        labels: [bug]
providers:
  scripts:
    - name: fix
      provider: claude
      match:
        phase: fix
      stdout: worktree add retry recovered
shim_faults:
  - name: worktree-add-exit-128
    command: git
    match:
      args_prefix: [worktree, add]
      attempt: 1
    stderr: "fatal: could not create worktree dir: File exists"
    exit_code: 128
