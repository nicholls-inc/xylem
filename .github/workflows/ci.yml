name: CI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".golangci.yml"
      - ".xylem/workflows/**"
      - "docs/invariants/**"
      - "scripts/check_invariant_coverage.py"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - ".golangci.yml"
      - ".xylem/workflows/**"
      - "docs/invariants/**"
      - "scripts/check_invariant_coverage.py"

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.24.0

      - name: Check formatting
        run: test -z "$(goimports -l .)"

      - run: go vet ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: cli

      - run: go build ./cmd/xylem
      - run: go test ./...

  invariant-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check invariant↔test coverage mapping
        run: python3 scripts/check_invariant_coverage.py
