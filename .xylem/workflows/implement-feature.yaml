name: implement-feature
description: "Implement a feature from a GitHub issue"
phases:
  - name: analyze
    prompt_file: .xylem/prompts/implement-feature/analyze.md
    max_turns: 20
    tier: high
    noop:
      match: XYLEM_NOOP
  - name: plan
    prompt_file: .xylem/prompts/implement-feature/plan.md
    max_turns: 20
    tier: high
  - name: implement
    prompt_file: .xylem/prompts/implement-feature/implement.md
    max_turns: 60
    tier: med
    evaluator:
      prompt_file: .xylem/prompts/implement-feature/implement_evaluator.md
      max_turns: 20
      max_iterations: 2
      pass_threshold: 0.8
      criteria:
        - name: correctness
          description: "The implementation satisfies the requested feature without contradicting the plan."
          weight: 0.65
          threshold: 0.8
        - name: verification
          description: "The changes include or preserve validation needed to trust the feature."
          weight: 0.35
          threshold: 0.7
    gate:
      type: command
      run: "make test"
      retries: 2
  - name: verify
    prompt_file: .xylem/prompts/implement-feature/verify.md
    max_turns: 60
    tier: med
    gate:
      type: command
      run: "make test"
      retries: 1
  - name: pr
    prompt_file: .xylem/prompts/implement-feature/pr.md
    max_turns: 25
    tier: med
    gate:
      type: command
      run: |
        set -euo pipefail
        current_branch=$(git branch --show-current)
        if [ -z "$current_branch" ] || [ "$current_branch" = "main" ]; then
          echo "ERROR: not on a feature branch (got: '${current_branch:-<empty>}')"
          exit 1
        fi
        pr_num=$(gh pr list --head "$current_branch" --json number --jq '.[0].number // empty' 2>/dev/null || true)
        if [ -z "$pr_num" ]; then
          echo "ERROR: no open PR found for branch $current_branch — pr phase failed silently (sandbox 403 or push error)"
          exit 1
        fi
        echo "PR #$pr_num confirmed for branch $current_branch"
      retries: 1
