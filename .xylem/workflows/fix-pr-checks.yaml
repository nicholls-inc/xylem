name: fix-pr-checks
description: "Diagnose and fix failing CI checks on a PR"
phases:
  - name: diagnose
    prompt_file: .xylem/prompts/fix-pr-checks/diagnose.md
    max_turns: 30
    llm: copilot
    model: gpt-5.4
    noop:
      match: XYLEM_NOOP
  - name: fix
    prompt_file: .xylem/prompts/fix-pr-checks/fix.md
    max_turns: 60
    llm: copilot
    model: gpt-5.4
    gate:
      type: command
      run: |
        set -e
        {{ if .Validation.Format }}{{ .Validation.Format }}{{ end }}
        {{ if .Validation.Lint }}{{ .Validation.Lint }}{{ end }}
        {{ if .Validation.Build }}{{ .Validation.Build }}{{ end }}
        {{ if .Validation.Test }}{{ .Validation.Test }}{{ end }}
      retries: 3
  - name: push
    prompt_file: .xylem/prompts/fix-pr-checks/push.md
    max_turns: 10
    llm: copilot
    model: gpt-5-mini
