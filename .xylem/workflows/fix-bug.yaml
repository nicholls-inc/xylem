name: fix-bug
description: "Diagnose and fix a bug from a GitHub issue"
phases:
  - name: analyze
    prompt_file: .xylem/prompts/fix-bug/analyze.md
    max_turns: 40
    tier: high
    noop:
      match: XYLEM_NOOP
  - name: plan
    prompt_file: .xylem/prompts/fix-bug/plan.md
    max_turns: 40
    tier: high
  - name: implement
    prompt_file: .xylem/prompts/fix-bug/implement.md
    max_turns: 60
    tier: med
    evaluator:
      prompt_file: .xylem/prompts/fix-bug/implement_evaluator.md
      max_turns: 20
      max_iterations: 2
      pass_threshold: 0.8
      criteria:
        - name: correctness
          description: "The patch addresses the reported bug without obvious regressions."
          weight: 0.7
          threshold: 0.8
        - name: verification
          description: "The changes include or preserve validation needed to trust the fix."
          weight: 0.3
          threshold: 0.7
    gate:
      type: command
      run: |
        set -e
        {{ if .Validation.Test }}{{ .Validation.Test }}{{ else }}echo "ERROR: validation.test not configured in .xylem.yml" >&2 && exit 1{{ end }}
      retries: 2
  - name: verify
    prompt_file: .xylem/prompts/fix-bug/verify.md
    max_turns: 60
    tier: med
    gate:
      type: command
      run: |
        set -e
        {{ if .Validation.Test }}{{ .Validation.Test }}{{ else }}echo "ERROR: validation.test not configured in .xylem.yml" >&2 && exit 1{{ end }}
      retries: 1
  - name: pr_draft
    prompt_file: .xylem/prompts/fix-bug/pr_draft.md
    max_turns: 25
    tier: med
    gate:
      type: command
      run: |
        set -euo pipefail
        git fetch origin main
        if ! git merge-base --is-ancestor origin/main HEAD; then
          echo "ERROR: branch is behind origin/main; rebase before creating the PR" >&2
          exit 1
        fi
        current_branch=$(git branch --show-current)
        git fetch origin "$current_branch" 2>/dev/null || true
        if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/$current_branch" 2>/dev/null)" ]; then
          echo "ERROR: branch not pushed or remote does not match HEAD" >&2
          exit 1
        fi
        test -f pr_draft.json || { echo "ERROR: pr_draft.json missing" >&2; exit 1; }
      retries: 1
  - name: pr_create
    type: command
    run: |
      set -euo pipefail
      TITLE=$(jq -r '.title' pr_draft.json)
      BODY=$(jq -r '.body' pr_draft.json)
      if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
        echo "ERROR: title missing or null in pr_draft.json" >&2
        exit 1
      fi
      BODY=$(printf '%s\n\nFixes #{{.Issue.Number}}' "$BODY")
      gh pr create \
        --repo {{.Repo.Slug}} \
        --title "$TITLE" \
        --body "$BODY" \
        --label "ready-to-merge"
