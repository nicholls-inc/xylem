name: triage
description: "Classify issues, split if too large, and label for refinement"
phases:
  - name: analyze
    prompt_file: .xylem/prompts/triage/analyze.md
    max_turns: 20
  - name: triage
    prompt_file: .xylem/prompts/triage/triage.md
    max_turns: 20
  - name: apply
    type: command
    run: |
      set -euo pipefail
      DECISION_FILE=".xylem/state/triage/{{.Issue.Number}}-decision.json"
      if [ ! -f "$DECISION_FILE" ]; then
        echo "ERROR: triage phase did not produce $DECISION_FILE"
        exit 1
      fi

      # Sanitize literal control chars from LLM-generated JSON string values.
      python3 -c '
      import sys, json

      def sanitize_json(text):
          result = []
          in_string = False
          escaped = False
          for ch in text:
              if escaped:
                  result.append(ch)
                  escaped = False
              elif ch == "\\" and in_string:
                  result.append(ch)
                  escaped = True
              elif ch == "\"":
                  result.append(ch)
                  in_string = not in_string
              elif in_string and ch == "\n":
                  result.append("\\n")
              elif in_string and ch == "\r":
                  result.append("\\r")
              elif in_string and ch == "\t":
                  result.append("\\t")
              else:
                  result.append(ch)
          return "".join(result)

      filepath = sys.argv[1]
      with open(filepath) as f:
          raw = f.read()
      sanitized = sanitize_json(raw)
      data = json.loads(sanitized)
      with open(filepath, "w") as f:
          json.dump(data, f, ensure_ascii=False)
      ' "$DECISION_FILE"

      ACTION=$(jq -r '.action' "$DECISION_FILE")
      TYPE_LABEL=$(jq -r '.type_label' "$DECISION_FILE")

      if [ "$ACTION" = "label" ]; then
        echo "Applying label action: type=$TYPE_LABEL"
        gh issue edit {{.Issue.Number}} --repo {{.Repo.Slug}} --add-label "${TYPE_LABEL},needs-refinement"
        sleep 1
        gh issue edit {{.Issue.Number}} --repo {{.Repo.Slug}} --remove-label "needs-triage"
        echo "Done: labeled issue #{{.Issue.Number}} with ${TYPE_LABEL} and needs-refinement"

      elif [ "$ACTION" = "split" ]; then
        echo "Applying split action: type=$TYPE_LABEL"
        SUB_COUNT=$(jq '.sub_issues | length' "$DECISION_FILE")
        echo "Creating ${SUB_COUNT} sub-issues..."

        CREATED_NUMBERS=""
        BODY_TMP=$(mktemp)
        trap 'rm -f "$BODY_TMP"' EXIT

        for i in $(seq 0 $((SUB_COUNT - 1))); do
          TITLE=$(jq -r ".sub_issues[$i].title" "$DECISION_FILE")
          BODY=$(jq -r ".sub_issues[$i].body" "$DECISION_FILE")
          printf '%s' "$BODY" > "$BODY_TMP"
          NEW_NUMBER=$(gh issue create \
            --repo {{.Repo.Slug}} \
            --title "$TITLE" \
            --body-file "$BODY_TMP" \
            --label "${TYPE_LABEL},needs-triage" \
            | grep -oE '[0-9]+$')
          echo "Created sub-issue #${NEW_NUMBER}: ${TITLE}"
          if [ -n "$CREATED_NUMBERS" ]; then
            CREATED_NUMBERS="${CREATED_NUMBERS}, #${NEW_NUMBER}"
          else
            CREATED_NUMBERS="#${NEW_NUMBER}"
          fi
          sleep 1
        done

        echo "Split into: ${CREATED_NUMBERS}" > "$BODY_TMP"
        gh issue edit {{.Issue.Number}} --repo {{.Repo.Slug}} --body-file "$BODY_TMP"
        sleep 1
        gh issue close {{.Issue.Number}} --repo {{.Repo.Slug}} --reason "not planned" --comment "Split into focused sub-issues: ${CREATED_NUMBERS}"
        echo "Done: closed #{{.Issue.Number}}, created sub-issues ${CREATED_NUMBERS}"

      else
        echo "ERROR: unknown action '${ACTION}' in $DECISION_FILE"
        exit 1
      fi
